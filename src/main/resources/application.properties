spring.application.name=spring-boot-docker-compose-mysql
# Server port
server.port=8080
# Datasource connection
spring.sql.init.platform=mysql
# Disable Spring's legacy SQL initialization to avoid conflicts with Flyway
spring.sql.init.mode=never
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.generate-ddl=true
spring.jpa.show-sql=true
# Logging
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.com.numericaideas=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Actuator + Micrometer
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoints.web.base-path=/actuator
management.metrics.export.prometheus.enabled=true

# Redis configuration (containerized)
spring.redis.host=redis
spring.redis.port=6379
 
# Datasource (reads container or local env vars)
# Prefer container-provided env vars (SPRING_DATASOURCE_URL etc.) but
# fallback to local defaults useful for development.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/userDB?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:S3cret}

# Flyway: allow baseline when schema isn't empty so versioned migrations apply

# Flyway settings
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Increase Flyway logging to help diagnose startup behavior
logging.level.org.flywaydb=DEBUG

# Ensure Flyway runs before JPA/Hibernate initializes the schema
spring.jpa.defer-datasource-initialization=true